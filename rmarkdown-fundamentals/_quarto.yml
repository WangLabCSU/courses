project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!slides/*.qmd"  # 幻灯片单独渲染

website:
  title: "R与(R)Markdown基础"
  description: "中南大学生物医学信息系 - 本科课程"
  site-url: https://your-domain.com/rmarkdown-fundamentals
  repo-url: https://github.com/csu-bmi/rmarkdown-fundamentals
  
  navbar:
    title: "R与(R)Markdown基础"
    left:
      - href: index.qmd
        text: 首页
      - href: syllabus.qmd
        text: 课程大纲
      - text: 教学资源
        menu:
          - href: slides/slides-r-basics.qmd
            text: "📊 幻灯片：R基础"
          - href: slides/slides-rmarkdown.qmd
            text: "📊 幻灯片：R Markdown"
          - href: labs/lab1-r-basics.qmd
            text: "🧪 实验1：R基础练习"
          - href: labs/lab2-rmarkdown.qmd
            text: "🧪 实验2：R Markdown实践"
      - href: resources.qmd
        text: 拓展资源
    right:
      - icon: github
        href: https://github.com/csu-bmi/rmarkdown-fundamentals
        aria-label: GitHub
      - text: "中南大学"
        href: https://www.csu.edu.cn

  sidebar:
    - title: "课程导航"
      style: "docked"
      contents:
        - section: "课程信息"
          contents:
            - index.qmd
            - syllabus.qmd
        - section: "理论教学"
          contents:
            - text: "第1讲：R语言基础"
              href: lectures/lecture1-r-basics.qmd
            - text: "第2讲：数据处理与可视化"
              href: lectures/lecture2-data-viz.qmd
            - text: "第3讲：R Markdown基础"
              href: lectures/lecture3-rmarkdown.qmd
            - text: "第4讲：现代报告工具"
              href: lectures/lecture4-quarto.qmd
        - section: "实验指导"
          contents:
            - labs/lab1-r-basics.qmd
            - labs/lab2-rmarkdown.qmd

  page-footer:
    left: "© 2025 王诗翔 - 中南大学生物医学信息系"
    center: 
      - text: "CSU BMI"
        href: https://bmi.csu.edu.cn
    right:
      - text: 许可证
        href: license.qmd

format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [darkly, styles/custom-dark.scss]
    css: styles/styles.css
    toc: true
    toc-location: right
    code-copy: true
    code-fold: show
    code-tools: true
    highlight-style: github
    fig-width: 8
    fig-height: 6
    knitr:
      opts_chunk:
        message: false
        warning: false

execute:
  freeze: auto
  echo: true

bibliography: references.bib

lang: zh-CN
