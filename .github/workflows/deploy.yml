name: Deploy Courses to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RENV_PATHS_ROOT: ~/.local/share/renv
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'
          use-public-rspm: true
          
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-
            
      - name: Install R dependencies
        run: |
          install.packages(c(
            "rmarkdown",
            "knitr",
            "ggplot2",
            "dplyr",
            "tidyr",
            "readr",
            "DT",
            "reticulate"
          ))
        shell: Rscript {0}
        
      - name: Render root website
        run: |
          echo "Rendering root website..."
          quarto render
          
      - name: Render courses
        run: |
          # 查找所有课程目录（包含_quarto.yml的子目录）
          for course in */; do
            course=${course%/}
            if [ -d "$course" ] && [ -f "$course/_quarto.yml" ]; then
              echo "Rendering course: $course"
              cd "$course"
              quarto render
              cd ..
            fi
          done
          
      - name: Organize build output
        run: |
          # 创建统一的_site目录（根目录渲染已经创建好了）
          # 复制各课程构建结果到根_site目录
          for course in */; do
            course=${course%/}
            if [ -d "$course/_site" ]; then
              echo "Copying $course to _site/"
              mkdir -p "_site/$course"
              cp -r "$course/_site"/* "_site/$course/"
            fi
          done
          
          echo "Build complete. Site structure:"
          ls -la _site/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
