project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

website:
  title: "CSU生物信息学课程"
  description: "中南大学生物信息学专业课程网站"
  site-url: https://wanglabcsu.github.io/courses
  repo-url: https://github.com/WangLabCSU/courses
  repo-branch: main
  
  navbar:
    title: "CSU生物信息学课程"
    left:
      - href: index.qmd
        text: 首页
      - text: 课程
        menu:
          - href: r-and-rmarkdown/index.qmd
            text: "R与(R)Markdown基础"
      - href: learning-resources.qmd
        text: 学习资源
    right:
      - icon: github
        href: https://github.com/WangLabCSU
        aria-label: GitHub
      - text: "实验室"
        href: https://wanglabcsu.github.io/

  page-footer:
    left: "© 2026 王诗翔 - 中南大学 · 生物信息学专业"
    center: 
      - text: "WangLabCSU"
        href: https://github.com/WangLabCSU
    right:
      - text: 许可证
        href: license.qmd

format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [darkly, styles/custom-dark.scss]
    css: styles/styles.css
    toc: true
    code-copy: true

lang: zh
