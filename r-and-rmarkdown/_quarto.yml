format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [darkly, styles/custom-dark.scss]
    css: styles/styles.css
    toc: true
    toc-location: right
    code-copy: true
    code-fold: show
    code-tools: true
    highlight-style: github
    fig-width: 8
    fig-height: 6
    knitr:
      opts_chunk:
        message: false
        warning: false
    # Pretty print enhancements
    code-block-bg: true
    code-block-border-left: "#8B0000"
    df-print: paged
    tbl-cap-location: top
    fig-cap-location: bottom
    link-external-icon: true
    link-external-newwindow: true

execute:
  freeze: true
  echo: true

bibliography: references.bib

lang: zh
